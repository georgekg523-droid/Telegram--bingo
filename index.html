
<!DOCTYPE html>
<html>
<head>
    <title>Bingo Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 20px; }
        button { padding: 20px; font-size: 20px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Bingo Zbet</h1>
    <p>Click the button to get a random number!</p>
    <h2 id="number">?</h2>
    <button onclick="pickNumber()">Pick Number</button>
    <script>
        function pickNumber() {
            document.getElementById('number').innerHTML = Math.floor(Math.random() * 75) + 1;
        }
    </script>
</body>
</html>
